
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XuanFeng 新标签页</title>
    <style>
        :root {
            color-scheme: dark;
            --text-primary: #f7f8fb;
            --text-secondary: rgba(247,248,251,0.72);
            --card-bg: rgba(255,255,255,0.88);
            --card-border: rgba(255,255,255,0.34);
            --shadow: 0 20px 60px rgba(0,0,0,0.18);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: linear-gradient(180deg, rgba(8,16,32,0.4), rgba(8,16,32,0.6));
            background-size: cover;
            background-position: center center;
            color: var(--text-primary);
            position: relative;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.6s ease-out 0.2s both;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-size: clamp(2.8rem, 5vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 18px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .search-container {
            margin-bottom: 32px;
        }

        .search-box {
            width: 100%;
            max-width: 760px;
            padding: 16px 24px;
            font-size: 1.1rem;
            border: 1px solid var(--card-border);
            border-radius: 999px;
            outline: none;
            transition: var(--transition);
            background: rgba(255,255,255,0.96);
            color: #111827;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .search-box:focus {
            border-color: rgba(66,133,244,0.85);
            box-shadow: 0 24px 60px rgba(26,115,232,0.12);
            transform: scale(1.02);
        }

        .search-box::placeholder {
            color: #9aa3b2;
            font-size: 1rem;
        }

        .top-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-top: 18px;
        }

        .time-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .time-group span {
            min-width: 120px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .image-attribution {
            font-size: 0.88rem;
            color: #d6d9e6;
            padding: 6px 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .engine-hint {
            text-align: right;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 10px;
            padding-right: 8px;
        }

        .engine-switch {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
        }

        .engine-button {
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.12);
            color: #eef2ff;
            padding: 10px 16px;
            border-radius: 999px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
        }

        .engine-button:hover,
        .engine-button.active {
            background: rgba(255,255,255,0.24);
            border-color: rgba(255,255,255,0.35);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .section-title {
            font-size: 1rem;
            color: rgba(255,255,255,0.88);
            text-align: left;
            margin: 32px 0 16px;
            padding-left: 10px;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }
        }

        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #f8fafc;
            transition: var(--transition);
            padding: 14px 10px;
            border-radius: 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            min-height: 60px;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .grid-item:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 20px 48px rgba(0,0,0,0.18);
        }

        .icon {
            display: none;
        }

        .grid-item:hover .icon {
            transform: scale(1.1);
        }

        .icon-img {
            width: 34px;
            height: 34px;
            object-fit: contain;
        }

        .site-name {
            font-size: 1.1rem;
            color: #f8fafc;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }

        .icon-bg-baidu { background: #4a6cf7; color: white; }
        .icon-bg-google { background: #ea4335; color: white; }
        .icon-bg-youtube { background: #ff0000; color: white; }
        .icon-bg-github { background: #24292e; color: white; }
        .icon-bg-bing { background: #008373; color: white; }
        .icon-bg-duckduckgo { background: #de5833; color: white; }
        .icon-bg-taobao { background: #ff6a00; color: white; }
        .icon-bg-bilibili { background: #fb7299; color: white; }
        .icon-bg-zhihu { background: #1772f6; color: white; }
        .icon-bg-weibo { background: #e6162d; color: white; }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <h1>XFBrowser</h1>

        <!-- 搜索栏 - 跟随浏览器选择的搜索引擎 -->
        <div class="search-container">
            <form id="searchForm" method="GET" onsubmit="return handleSearch()" role="search">
                <input type="text" id="searchInput" class="search-box" placeholder="搜索或输入网址，支持直接输入网址" autofocus aria-label="搜索框">
                <div class="engine-hint" id="engineHint" aria-live="polite">正在使用 百度 搜索</div>
            </form>
            <div class="top-info">
                <div class="time-group">
                    <span id="timeLabel">--:--</span>

                </div>
                <div class="image-attribution" id="imageAttribution">Bing 每日美图</div>
            </div>
            <div class="engine-switch" id="engineSwitch" role="group" aria-label="搜索引擎选择">
                <button type="button" class="engine-button active" data-engine="baidu" aria-pressed="true">百度</button>

            </div>
        </div>

        <!-- xuanfeng -->

    <span class="site-name">xuanfeng Studio</span>
</a>

<a href="https://xfbrowser.fwh.is" class="grid-item" role="listitem" aria-label="访问 XFbrowser">
    <img src="/picture/xuanfengbrowser.png" alt="xuanfeng browser" class="icon">
    <span class="site-name">XFbrowser</span>
</a>

    <img src="/picture/3d3k.png" alt="3D3K" class="icon">
    <span class="site-name">Minecraft无政府服务器-3D3K</span>

        </div>
        
        <!-- 国内常用 -->
        <div class="section-title">国内常用</div>
        <div class="grid" role="list">
            <!-- 百度 -->
            <a href="https://www.baidu.com" class="grid-item" role="listitem" aria-label="访问 百度">
                <div class="icon icon-bg-baidu">百</div>

            </a>
            <!-- 淘宝 -->
            <a href="https://www.taobao.com" class="grid-item" role="listitem" aria-label="访问 淘宝">

            </a>
            <!-- 知乎 -->
            <a href="https://www.zhihu.com" class="grid-item" role="listitem" aria-label="访问 知乎">

                <img src="/picture/google.jpg" alt="google" class="icon">

    <script>
        const engines = {
            'baidu': { name: '百度', url: 'https://www.baidu.com/s?wd=' },
            'google': { name: 'Google', url: 'https://www.google.com/search?q=' },
            'bing': { name: 'Bing', url: 'https://www.bing.com/search?q=' },
            'duckduckgo': { name: 'DuckDuckGo', url: 'https://duckduckgo.com/?q=' },
            'sogou': { name: '搜狗', url: 'https://www.sogou.com/web?query=' },
            '360': { name: '360', url: 'https://www.so.com/s?q=' },
            'ahmia': { name: 'Ahmia', url: 'https://ahmia.fi/search/?q=' }
        };

        let currentEngineKey = 'baidu';

        function getCurrentEngineKey() {
            const urlParams = new URLSearchParams(window.location.search);
            const engine = urlParams.get('engine');
            return engine && engines[engine] ? engine : 'baidu';
        }

        function getCurrentEngine() {
            return engines[currentEngineKey];
        }

        function setEngineQueryParam(engine) {
            const url = new URL(window.location.href);
            url.searchParams.set('engine', engine);
            window.history.replaceState(null, '', url);
        }

        function updateEngineHint() {
            const engine = getCurrentEngine();
            document.getElementById('engineHint').textContent = `正在使用 ${engine.name} 搜索`;
            highlightEngine(currentEngineKey);
        }

        function highlightEngine(engineKey) {
            document.querySelectorAll('.engine-button').forEach(button => {
                const isActive = button.dataset.engine === engineKey;
                button.classList.toggle('active', isActive);
                button.setAttribute('aria-pressed', isActive);
            });
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return false;

            const engine = getCurrentEngine();
            if (isValidUrl(query)) {
                let url = query;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'http://' + url;
                }
                window.location.href = url;
            } else {
                window.location.href = engine.url + encodeURIComponent(query);
            }
            return false;
        }

        function isValidUrl(input) {
            if (input.startsWith('http://') || input.startsWith('https://')) return true;
            if (input.includes('.') && !input.includes(' ')) {
                const parts = input.split('.');
                if (parts.length >= 2 && parts[parts.length - 1].length >= 2) {
                    return true;
                }
            }
            return false;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('timeLabel').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('dateLabel').textContent = now.toLocaleDateString('zh-CN', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        }

        async function loadBingDailyImage() {
            const attribution = document.getElementById('imageAttribution');
            const defaultBackground = 'linear-gradient(180deg, rgba(8,16,32,0.4), rgba(8,16,32,0.6))';
            attribution.innerHTML = '<div class="loading"></div> 正在加载每日美图...';
            try {
                const response = await fetch('https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN', { cache: 'force-cache' });
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                const imageUrl = `https://www.bing.com${data.images[0].url}`;
                // 预加载图片
                const img = new Image();
                img.onload = () => {
                    document.body.style.backgroundImage = `${defaultBackground}, url(${imageUrl})`;
                    attribution.textContent = `Bing 每日美图 · ${data.images[0].copyright}`;
                };
                img.onerror = () => {
                    throw new Error('Image load failed');
                };
                img.src = imageUrl;
            } catch (error) {
                console.warn('Bing 每日美图加载失败：', error);
                document.body.style.backgroundImage = defaultBackground;
                attribution.textContent = 'Bing 每日美图加载失败，已显示默认背景';
            }
        }

        function bindEngineButtons() {
            document.querySelectorAll('.engine-button').forEach(button => {
                button.addEventListener('click', () => {
                    const engine = button.dataset.engine;
                    if (!engines[engine]) return;
                    currentEngineKey = engine;
                    setEngineQueryParam(engine);
                    updateEngineHint();
                });
            });
        }

        window.onload = function() {
            currentEngineKey = getCurrentEngineKey();
            updateEngineHint();
            bindEngineButtons();
            updateClock();
            setInterval(updateClock, 60000);
            loadBingDailyImage();
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            });
            // 添加键盘快捷键
            document.addEventListener('keydown', function(e) {
                // Ctrl+K 或 Cmd+K 聚焦搜索框
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
                // ESC 清除搜索框
                if (e.key === 'Escape') {
                    document.getElementById('searchInput').value = '';
                    document.getElementById('searchInput').blur();
                }
            });
        };
    </script>
</body>
